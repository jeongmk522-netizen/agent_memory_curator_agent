<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Memory Curator Agent workflow</title>
  <desc id="desc">A workflow diagram showing worker agents emitting memory events to a Memory Curator Agent, which validates, redacts, classifies, deduplicates, and routes memory into agent repo, agent team, project, or session memory.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbfb"/>
      <stop offset="1" stop-color="#eef7f7"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#006f73"/>
      <stop offset="1" stop-color="#00a39a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1b24a"/>
      <stop offset="1" stop-color="#d88b24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#143033" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#008c87"/>
    </marker>
    <style>
      .title { font: 800 36px Arial, Helvetica, sans-serif; fill: #173437; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #4c6265; }
      .section { font: 700 21px Arial, Helvetica, sans-serif; fill: #173437; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #173437; }
      .small { font: 500 15px Arial, Helvetica, sans-serif; fill: #4c6265; }
      .tiny { font: 600 13px Arial, Helvetica, sans-serif; fill: #5a6b6d; }
      .white { fill: #ffffff; }
      .card { fill: #ffffff; stroke: #c8d9d9; stroke-width: 2; }
      .muted { fill: #f8fbfb; stroke: #d7e2e2; stroke-width: 2; }
      .arrow { stroke: #008c87; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .thin { stroke: #bdd0d0; stroke-width: 2; fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="78" text-anchor="middle" class="title">Agentlas Memory Curator Agent</text>
  <text x="800" y="110" text-anchor="middle" class="subtitle">Worker agents emit memory events; the curator decides what belongs where.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="185" width="245" height="300" rx="22" class="card"/>
    <rect x="70" y="185" width="245" height="54" rx="22" fill="url(#teal)"/>
    <text x="192.5" y="219" text-anchor="middle" class="section white">Worker Agents</text>
    <text x="105" y="278" class="label">PM Soul</text>
    <text x="105" y="324" class="label">Finance Agent</text>
    <text x="105" y="370" class="label">Deck Agent</text>
    <text x="105" y="416" class="label">QA Agent</text>
    <text x="105" y="458" class="small">Emit structured events</text>

    <rect x="375" y="240" width="250" height="190" rx="20" class="muted"/>
    <rect x="375" y="240" width="250" height="50" rx="20" fill="url(#amber)"/>
    <text x="500" y="272" text-anchor="middle" class="section white">Memory Events</text>
    <text x="410" y="323" class="small">kind</text>
    <text x="410" y="352" class="small">suggested scope</text>
    <text x="410" y="381" class="small">sensitivity</text>
    <text x="410" y="410" class="small">evidence refs</text>

    <circle cx="800" cy="335" r="122" fill="url(#teal)" stroke="#b6f0eb" stroke-width="8"/>
    <text x="800" y="314" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#ffffff">Memory</text>
    <text x="800" y="354" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#ffffff">Curator</text>
    <text x="800" y="386" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#d6fffb">validate, redact, classify</text>

    <rect x="995" y="180" width="245" height="78" rx="18" class="card"/>
    <text x="1117.5" y="214" text-anchor="middle" class="label">Agent Repo Memory</text>
    <text x="1117.5" y="239" text-anchor="middle" class="small">agent-specific design</text>

    <rect x="995" y="285" width="245" height="78" rx="18" class="card"/>
    <text x="1117.5" y="319" text-anchor="middle" class="label">Agent Team Memory</text>
    <text x="1117.5" y="344" text-anchor="middle" class="small">shared procedures</text>

    <rect x="995" y="390" width="245" height="78" rx="18" class="card"/>
    <text x="1117.5" y="424" text-anchor="middle" class="label">Project Memory</text>
    <text x="1117.5" y="449" text-anchor="middle" class="small">decisions, risks, state</text>

    <rect x="995" y="495" width="245" height="78" rx="18" class="card"/>
    <text x="1117.5" y="529" text-anchor="middle" class="label">Session Scratch</text>
    <text x="1117.5" y="554" text-anchor="middle" class="small">temporary context</text>

    <rect x="1310" y="285" width="215" height="110" rx="20" fill="#fff8ea" stroke="#e0bd6b" stroke-width="2"/>
    <text x="1417.5" y="325" text-anchor="middle" class="label">Reject / Redact</text>
    <text x="1417.5" y="354" text-anchor="middle" class="small">secrets, raw logs,</text>
    <text x="1417.5" y="377" text-anchor="middle" class="small">unsafe memory</text>
  </g>

  <path d="M315 335 H368" class="arrow"/>
  <path d="M625 335 H670" class="arrow"/>
  <path d="M918 300 C958 250 950 219 990 219" class="arrow"/>
  <path d="M925 325 H990" class="arrow"/>
  <path d="M918 370 C960 410 950 429 990 429" class="arrow"/>
  <path d="M900 420 C960 500 930 534 990 534" class="arrow"/>
  <path d="M922 335 H1304" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="245" y="650" width="1110" height="108" rx="20" class="card"/>
    <text x="800" y="690" text-anchor="middle" class="section">Curator Output</text>
    <text x="800" y="724" text-anchor="middle" class="small">accepted writes, proposed writes, rejected events, redactions, conflicts, and audit notes</text>
  </g>
  <path d="M800 458 V644" class="arrow"/>
</svg>
